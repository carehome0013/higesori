
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
#app{font-family:'Hiragino Sans','Meiryo',sans-serif;background:#f0f2f5;font-size:14px;}
.page{display:none;flex-direction:column;min-height:100%;}
.page.active{display:flex;}

.main-header{background:#fff;padding:10px 12px 8px;box-shadow:0 1px 3px rgba(0,0,0,.1);position:sticky;top:0;z-index:10;}
.top-bar{display:flex;align-items:center;gap:6px;}
.top-left{display:flex;align-items:center;gap:6px;flex:1;min-width:0;}
.top-title{font-size:15px;font-weight:700;color:#222;white-space:nowrap;}
.month-tag{font-size:13px;font-weight:500;color:#555;white-space:nowrap;}
.btn-clear{background:#f5c842;color:#333;border:2px solid #c8a000;border-radius:6px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.btn-edit-open{background:#4a7fd9;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.date-info{font-size:10px;color:#888;margin-top:5px;}
.main-body{padding:8px;}
.legend{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.legend-item{display:flex;align-items:center;gap:3px;font-size:10px;color:#666;}
.legend-box{width:12px;height:12px;border-radius:2px;border:1px solid #bbb;flex-shrink:0;}

/* ★ テーブル：名前列を内容に合わせる */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.1);}
table{
  border-collapse:collapse;
  font-size:11px;
  /* width指定なし → 内容に応じた幅 */
  width:auto;
  /* ★ table-layout:auto で各列が内容に合わせて伸縮 */
  table-layout:auto;
}
th,td{border:1px solid #ccc;text-align:center;padding:0;}

/* 名前列：内容に合わせる・折り返しなし */
.col-name{
  white-space:nowrap;   /* 折り返し禁止 */
  /* width指定なし → auto */
}
.col-type{width:28px;}
.col-day{width:36px;}
.col-note{
  white-space:nowrap;
  width:1%;           /* できるだけ小さく → 内容だけ */
  min-width:44px;
}

.hdr-row th{background:#f5f7fa;padding:4px 3px;font-weight:600;font-size:10px;color:#333;white-space:nowrap;}
.hdr-sun{color:#c00;}.hdr-sat{color:#33a;}

.name-cell{padding:2px 5px;text-align:left;background:#fff;white-space:nowrap;}
.name-inner{display:inline-flex;align-items:center;gap:3px;}
.room-badge{font-size:9px;color:#fff;background:#777;border-radius:2px;padding:1px 3px;white-space:nowrap;flex-shrink:0;}
.name-txt{font-size:10px;white-space:nowrap;color:#222;}

.type-cell{font-size:10px;padding:1px 2px;background:#fafafa;white-space:nowrap;}
.type-kaijo{color:#1a8a40;font-weight:700;}
.type-jiritsu{color:#7733cc;font-weight:700;}

.check-cell{cursor:pointer;height:38px;vertical-align:middle;}
.bg-checked{background:#b8d8f8 !important;}
.bg-pattern{background:#d6f0d6;}
.bg-normal{background:#fff;}

.cb-box{width:24px;height:24px;border:2.5px solid #333;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;background:#fff;margin:auto;pointer-events:none;}
.cb-box.checked svg{display:block;}
.cb-box svg{display:none;width:15px;height:15px;}

.note-cell{font-size:8.5px;color:#333;padding:1px 3px;background:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;vertical-align:middle;}
.note-red{color:#c00;font-weight:600;}

/* ===== 編集ページ ===== */
#page-edit{background:#f0f2f5;}
.edit-header{background:#3a6fc9;color:#fff;padding:12px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;box-shadow:0 2px 6px rgba(0,0,0,.2);}
.edit-header h2{font-size:15px;font-weight:700;flex:1;}
.btn-back{background:rgba(255,255,255,.18);color:#fff;border:1.5px solid rgba(255,255,255,.5);border-radius:6px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
.edit-body{padding:10px;}
.card{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.card-title{font-size:13px;font-weight:700;color:#333;margin-bottom:10px;padding-bottom:8px;border-bottom:1.5px solid #eee;}
.floor-btns{display:flex;gap:8px;flex-wrap:wrap;}
.floor-btn{border:1.5px solid #bbb;border-radius:8px;padding:9px 0;font-size:14px;background:#fff;color:#444;cursor:pointer;font-weight:500;flex:1;text-align:center;}
.floor-btn.active{background:#4a7fd9;color:#fff;border-color:#4a7fd9;font-weight:700;}
.list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.list-header span{font-size:13px;font-weight:700;color:#333;}
.btn-new{background:#2a9a5a;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;}
.user-item{display:flex;align-items:center;gap:6px;padding:12px 0;border-bottom:1px solid #f0f0f0;cursor:pointer;}
.user-item:last-child{border-bottom:none;}
.user-item.selected{background:#eef3ff;margin:0 -14px;padding:12px 14px;}
.ui-num{font-size:10px;color:#fff;background:#bbb;border-radius:3px;padding:2px 5px;min-width:26px;text-align:center;flex-shrink:0;}
.ui-room{font-size:10px;color:#fff;background:#666;border-radius:3px;padding:2px 6px;min-width:42px;text-align:center;flex-shrink:0;}
.ui-info{flex:1;min-width:0;}
.ui-name{font-size:13px;font-weight:600;color:#222;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ui-sub{font-size:10px;color:#888;margin-top:2px;}
.ui-pat{font-size:10px;color:#2a7a2a;background:#d6f0d6;border-radius:3px;padding:2px 5px;white-space:nowrap;display:inline-block;}
.ui-del{background:#e55;color:#fff;border:none;border-radius:6px;padding:8px 12px;font-size:12px;cursor:pointer;flex-shrink:0;}
.no-user{text-align:center;color:#aaa;font-size:13px;padding:20px 0;}
.form-section{display:none;}
.form-section.open{display:block;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;color:#555;margin-bottom:5px;font-weight:600;}
.field input,.field select{width:100%;border:1.5px solid #ddd;border-radius:8px;padding:12px;font-size:16px;color:#222;background:#fff;-webkit-appearance:none;}
.field input:focus,.field select:focus{outline:none;border-color:#4a7fd9;box-shadow:0 0 0 3px rgba(74,127,217,.1);}
.two-col{display:flex;gap:10px;}.two-col .field{flex:1;}
.hint{font-size:10px;color:#aaa;margin-top:3px;}
.room-preview{font-size:12px;color:#4a7fd9;font-weight:700;min-height:18px;margin-bottom:8px;}
.form-btns{display:flex;gap:10px;margin-top:6px;}
.btn-save{flex:1;background:#4a7fd9;color:#fff;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;}
.btn-cancel-form{flex:1;background:#f0f0f0;color:#555;border:none;border-radius:8px;padding:14px;font-size:15px;cursor:pointer;}
.err{color:#c00;font-size:12px;margin-top:6px;min-height:16px;}

.confirm-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;align-items:flex-end;justify-content:center;}
.confirm-bg.open{display:flex;}
.confirm-box{background:#fff;border-radius:16px 16px 0 0;padding:24px 20px 36px;width:100%;max-width:500px;text-align:center;}
.confirm-name{font-size:15px;font-weight:700;color:#222;margin-bottom:6px;}
.confirm-sub{font-size:13px;color:#888;margin-bottom:20px;}
.confirm-btns{display:flex;flex-direction:column;gap:10px;}
.btn-cd{background:#e55;color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;width:100%;}
.btn-cc{background:#f0f0f0;color:#555;border:none;border-radius:10px;padding:14px;font-size:15px;cursor:pointer;width:100%;}
</style>

<div id="app">
  <div id="page-main" class="page active">
    <div class="main-header">
      <div class="top-bar">
        <div class="top-left">
          <button class="btn-clear" onclick="clearAll()">クリア</button>
          <span class="month-tag" id="month-tag"></span>
          <span class="top-title" id="main-title">2F 髭剃り表</span>
        </div>
        <button class="btn-edit-open" onclick="goEdit()">編集</button>
      </div>
      <div class="date-info" id="date-info"></div>
    </div>
    <div class="main-body">
      <div class="legend">
        <div class="legend-item"><div class="legend-box" style="background:#d6f0d6;"></div>担当曜日</div>
        <div class="legend-item"><div class="legend-box" style="background:#b8d8f8;"></div>実施済み</div>
        <div style="font-size:10px;color:#aaa;margin-left:auto;">← 横スクロール</div>
      </div>
      <div class="tbl-wrap">
        <table id="main-table">
          <thead>
            <tr class="hdr-row" id="hdr-youbi"></tr>
            <tr class="hdr-row" id="hdr-date"></tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="page-edit" class="page">
    <div class="edit-header">
      <button class="btn-back" onclick="goMain()">← 戻る</button>
      <h2>利用者編集</h2>
    </div>
    <div class="edit-body">
      <div class="card">
        <div class="card-title">フロア設定</div>
        <div class="floor-btns">
          <button class="floor-btn active" data-floor="2" onclick="setFloor(this)">2階</button>
          <button class="floor-btn" data-floor="3" onclick="setFloor(this)">3階</button>
          <button class="floor-btn" data-floor="4" onclick="setFloor(this)">4階</button>
          <button class="floor-btn" data-floor="5" onclick="setFloor(this)">5階</button>
        </div>
      </div>
      <div class="card">
        <div class="list-header">
          <span>利用者一覧</span>
          <button class="btn-new" onclick="openForm(-1)">＋ 追加</button>
        </div>
        <div id="user-list"></div>
      </div>
      <div class="card form-section" id="form-card">
        <div class="card-title" id="form-title">新規追加</div>
        <div class="two-col">
          <div class="field">
            <label>居室番号（例：201）</label>
            <input id="inp-room-full" type="text" inputmode="numeric" placeholder="201" maxlength="6" oninput="updatePreview()"/>
            <div class="hint">3桁以上</div>
          </div>
          <div class="field">
            <label>部屋番号（1〜4）</label>
            <input id="inp-room-num" type="number" inputmode="numeric" placeholder="" min="1" max="4" oninput="updatePreview()"/>
            <div class="hint">個室は空欄</div>
          </div>
        </div>
        <div class="room-preview" id="room-preview"></div>
        <div class="two-col">
          <div class="field"><label>苗字</label><input id="inp-sei" type="text" placeholder="山田"/></div>
          <div class="field"><label>名前</label><input id="inp-mei" type="text" placeholder="太郎"/></div>
        </div>
        <div class="field">
          <label>対応</label>
          <select id="inp-type">
            <option value="声掛">声掛</option>
            <option value="介助">介助</option>
            <option value="自立">自立</option>
          </select>
        </div>
        <div class="field"><label>備考</label><input id="inp-note" type="text" placeholder="例：詰所預かり"/></div>
        <div class="err" id="form-err"></div>
        <div class="form-btns">
          <button class="btn-cancel-form" onclick="closeForm()">キャンセル</button>
          <button class="btn-save" onclick="saveForm()">保存</button>
        </div>
      </div>
    </div>
  </div>

  <div class="confirm-bg" id="confirm-bg" onclick="bgClose(event)">
    <div class="confirm-box">
      <div class="confirm-name" id="confirm-name"></div>
      <div class="confirm-sub">この利用者を削除しますか？</div>
      <div class="confirm-btns">
        <button class="btn-cd" onclick="doDelete()">削除する</button>
        <button class="btn-cc" onclick="closeConfirm()">キャンセル</button>
      </div>
    </div>
  </div>
</div>

<script>
var DAY=['日','月','火','水','木','金','土'];
var currentFloor=2,editIdx=-1,deleteIdx=-1,lastWeekKey='';

var users=[
  {room:'201',roomNum:'',sei:'姫島',mei:'花子',type:'声掛',checks:[0,0,0,0,0,0,0],note:''},
  {room:'202',roomNum:'',sei:'岩永',mei:'一郎',type:'介助',checks:[0,0,0,0,0,0,0],note:'詰所預かり'},
  {room:'203',roomNum:'',sei:'三橋',mei:'次郎',type:'声掛',checks:[0,0,0,0,0,0,0],note:''},
  {room:'204',roomNum:'',sei:'中井',mei:'三郎',type:'声掛',checks:[0,0,0,0,0,0,0],note:''},
  {room:'205',roomNum:'',sei:'千々岩',mei:'四郎',type:'声掛',checks:[0,0,0,0,0,0,0],note:''},
  {room:'206',roomNum:'',sei:'',mei:'',type:'声掛',checks:[0,0,0,0,0,0,0],note:''},
  {room:'207',roomNum:'',sei:'山下',mei:'五郎',type:'介助',checks:[0,0,0,0,0,0,0],note:'詰所預かり'},
  {room:'208',roomNum:'',sei:'白木',mei:'六郎',type:'声掛',checks:[0,0,0,0,0,0,0],note:''},
  {room:'209',roomNum:'',sei:'',mei:'',type:'声掛',checks:[0,0,0,0,0,0,0],note:''},
];

function showPage(id){
  document.querySelectorAll('#app .page').forEach(function(p){p.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function goMain(){showPage('page-main');render();}
function goEdit(){closeForm();showPage('page-edit');syncFloor();renderList();}
function setFloor(btn){
  currentFloor=parseInt(btn.getAttribute('data-floor'));
  syncFloor();updateTitle();
}
function syncFloor(){
  document.querySelectorAll('.floor-btn').forEach(function(b){
    b.classList.toggle('active',parseInt(b.getAttribute('data-floor'))===currentFloor);
  });
}
function updateTitle(){document.getElementById('main-title').textContent=currentFloor+'F 髭剃り表';}

function getWeekDates(){
  var t=new Date(),dow=t.getDay(),sun=new Date(t);
  sun.setDate(t.getDate()-dow);
  var arr=[];
  for(var i=0;i<7;i++){var d=new Date(sun);d.setDate(sun.getDate()+i);arr.push(d);}
  return arr;
}
function weekKey(d){return d[0].getFullYear()+'-'+(d[0].getMonth()+1)+'-'+d[0].getDate();}
function isPat(row,col){return col===row%7||col===(row+3)%7;}
function patLabel(row){return DAY[row%7]+'・'+DAY[(row+3)%7];}
function rKey(u){return(parseInt(u.room)||99999)*10+(parseInt(u.roomNum)||0);}
function getSorted(){return users.slice().sort(function(a,b){return rKey(a)-rKey(b);});}
function rLabel(u){
  var r=u.room||'',n=u.roomNum||'';
  if(!r)return'--';
  return(n&&parseInt(n)>=1&&parseInt(n)<=4)?r+'-'+n:r;
}

function buildHeader(dates){
  var hy=document.getElementById('hdr-youbi'),hd=document.getElementById('hdr-date');
  hy.innerHTML='';hd.innerHTML='';
  function addTh(p,cls,rs,txt){
    var th=document.createElement('th');
    if(cls)th.className=cls;
    if(rs)th.setAttribute('rowspan',rs);
    th.textContent=txt;p.appendChild(th);
  }
  addTh(hy,'col-name',2,'ご利用者名');
  addTh(hy,'col-type',2,'対応');
  dates.forEach(function(d){
    var dow=d.getDay();
    addTh(hy,'col-day'+(dow===0?' hdr-sun':dow===6?' hdr-sat':''),null,'（'+DAY[dow]+'）');
  });
  addTh(hy,'col-note',2,'備考');
  dates.forEach(function(d,i){
    var dow=d.getDay(),m=d.getMonth()+1,dd=d.getDate();
    var txt=(i===0||d.getMonth()!==dates[i-1].getMonth())?m+'/'+dd:String(dd);
    addTh(hd,'col-day'+(dow===0?' hdr-sun':dow===6?' hdr-sat':''),null,txt);
  });
  var months=[];
  dates.forEach(function(d){var m=d.getMonth()+1;if(months.indexOf(m)<0)months.push(m);});
  document.getElementById('month-tag').textContent=months.join('・')+'月';
  var fmt=function(d){return(d.getMonth()+1)+'月'+d.getDate()+'日';};
  document.getElementById('date-info').textContent=
    dates[0].getFullYear()+'年　'+fmt(dates[0])+'（日）〜 '+fmt(dates[6])+'（土）';
}

function makeCB(checked){
  var box=document.createElement('div');
  box.className='cb-box'+(checked?' checked':'');
  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 16 16');
  var pl=document.createElementNS('http://www.w3.org/2000/svg','polyline');
  pl.setAttribute('points','2,8 6,12 14,4');
  pl.setAttribute('stroke','#222');pl.setAttribute('stroke-width','2.5');
  pl.setAttribute('fill','none');pl.setAttribute('stroke-linecap','round');pl.setAttribute('stroke-linejoin','round');
  svg.appendChild(pl);box.appendChild(svg);return box;
}

function render(){
  var dates=getWeekDates(),newKey=weekKey(dates);
  if(lastWeekKey&&lastWeekKey!==newKey){users.forEach(function(u){u.checks=[0,0,0,0,0,0,0];});}
  lastWeekKey=newKey;
  buildHeader(dates);updateTitle();
  var sorted=getSorted(),tb=document.getElementById('tbody');
  tb.innerHTML='';
  sorted.forEach(function(u,ri){
    var tr=document.createElement('tr');

    // ★ 名前列：内容幅のみ（white-space:nowrap + table-layout:autoで自動調整）
    var tdN=document.createElement('td');tdN.className='name-cell';
    var ni=document.createElement('div');ni.className='name-inner';
    var rb=document.createElement('span');rb.className='room-badge';rb.textContent=rLabel(u);
    var nt=document.createElement('span');nt.className='name-txt';
    nt.textContent=((u.sei||'')+(u.mei?' '+u.mei:'')||'　')+' 様';
    ni.appendChild(rb);ni.appendChild(nt);tdN.appendChild(ni);tr.appendChild(tdN);

    // 対応
    var tdT=document.createElement('td');tdT.className='type-cell';
    var sp=document.createElement('span');
    sp.className=u.type==='介助'?'type-kaijo':u.type==='自立'?'type-jiritsu':'';
    sp.textContent=u.type;tdT.appendChild(sp);tr.appendChild(tdT);

    // チェックセル
    for(var d=0;d<7;d++){
      var td=document.createElement('td');td.className='check-cell';
      var pat=isPat(ri,d);
      var chk=u.checks[d]===1;
      if(chk){
        td.classList.add('bg-checked');
        td.appendChild(makeCB(true));
      } else if(pat){
        td.classList.add('bg-pattern');
        td.appendChild(makeCB(false));
      } else {
        td.classList.add('bg-normal');
      }
      (function(uRef,di,isPatt){
        td.onclick=function(){
          if(!isPatt&&!uRef.checks[di])return;
          var idx=users.indexOf(uRef);
          if(idx>=0){users[idx].checks[di]=users[idx].checks[di]?0:1;render();}
        };
      })(u,d,pat);
      tr.appendChild(td);
    }

    // 備考
    var tdNt=document.createElement('td');tdNt.className='note-cell';
    if(u.note){var s=document.createElement('span');s.className='note-red';s.textContent=u.note;tdNt.appendChild(s);}
    tr.appendChild(tdNt);
    tb.appendChild(tr);
  });
}

function clearAll(){users.forEach(function(u){u.checks=[0,0,0,0,0,0,0];});render();}

function renderList(){
  var sorted=getSorted(),ul=document.getElementById('user-list');
  ul.innerHTML='';
  if(!sorted.length){
    var d=document.createElement('div');d.className='no-user';d.textContent='利用者が登録されていません';
    ul.appendChild(d);return;
  }
  sorted.forEach(function(u,si){
    var ri=users.indexOf(u);
    var item=document.createElement('div');
    item.className='user-item'+(editIdx===ri?' selected':'');
    function mk(cls,txt){var s=document.createElement('span');s.className=cls;s.textContent=txt;return s;}
    item.appendChild(mk('ui-num',(si+1)+'番'));
    item.appendChild(mk('ui-room',rLabel(u)));
    var info=document.createElement('div');info.className='ui-info';
    var nm=document.createElement('div');nm.className='ui-name';
    nm.textContent=((u.sei||'')+(u.mei?' '+u.mei:'')||'（未入力）')+' 様';
    var sub=document.createElement('div');sub.className='ui-sub';
    sub.innerHTML=u.type+'　<span class="ui-pat">'+patLabel(si)+'</span>';
    info.appendChild(nm);info.appendChild(sub);
    item.appendChild(info);
    var db=document.createElement('button');db.className='ui-del';db.textContent='削除';
    (function(idx){db.onclick=function(e){e.stopPropagation();openConfirm(idx);};})(ri);
    (function(idx){item.onclick=function(){openForm(idx);};})(ri);
    item.appendChild(db);ul.appendChild(item);
  });
}

function openForm(idx){
  editIdx=idx;
  document.getElementById('form-card').classList.add('open');
  document.getElementById('form-err').textContent='';
  document.getElementById('room-preview').textContent='';
  if(idx===-1){
    document.getElementById('form-title').textContent='新規追加';
    ['inp-room-full','inp-sei','inp-mei','inp-note'].forEach(function(id){document.getElementById(id).value='';});
    document.getElementById('inp-room-num').value='';
    document.getElementById('inp-type').value='声掛';
  } else {
    var u=users[idx];
    document.getElementById('form-title').textContent='編集：'+(u.sei||'')+(u.mei?' '+u.mei:'')+' 様';
    document.getElementById('inp-room-full').value=u.room||'';
    document.getElementById('inp-room-num').value=u.roomNum||'';
    document.getElementById('inp-sei').value=u.sei||'';
    document.getElementById('inp-mei').value=u.mei||'';
    document.getElementById('inp-type').value=u.type||'声掛';
    document.getElementById('inp-note').value=u.note||'';
    updatePreview();
  }
  renderList();
  setTimeout(function(){document.getElementById('form-card').scrollIntoView({behavior:'smooth'});},120);
}
function closeForm(){editIdx=-1;document.getElementById('form-card').classList.remove('open');renderList();}
function updatePreview(){
  var full=(document.getElementById('inp-room-full').value||'').trim();
  var num=(document.getElementById('inp-room-num').value||'').trim();
  var prev=document.getElementById('room-preview');
  if(!full){prev.textContent='';return;}
  var n=parseInt(num);
  prev.textContent='表示例：'+((num!==''&&n>=1&&n<=4)?full+'-'+num:full);
}
function saveForm(){
  var full=(document.getElementById('inp-room-full').value||'').trim();
  var num=(document.getElementById('inp-room-num').value||'').trim();
  var sei=(document.getElementById('inp-sei').value||'').trim();
  var mei=(document.getElementById('inp-mei').value||'').trim();
  var type=document.getElementById('inp-type').value;
  var note=(document.getElementById('inp-note').value||'').trim();
  var err=document.getElementById('form-err');
  if(!full){err.textContent='居室番号を入力してください';return;}
  if(!sei){err.textContent='苗字を入力してください';return;}
  err.textContent='';
  var n=parseInt(num),vn=(num!==''&&n>=1&&n<=4)?String(n):'';
  if(editIdx>=0){
    var u=users[editIdx];
    u.room=full;u.roomNum=vn;u.sei=sei;u.mei=mei;u.type=type;u.note=note;
  } else {
    users.push({room:full,roomNum:vn,sei:sei,mei:mei,type:type,checks:[0,0,0,0,0,0,0],note:note});
  }
  closeForm();
}
function openConfirm(idx){
  deleteIdx=idx;
  var u=users[idx];
  document.getElementById('confirm-name').textContent=((u.sei||'')+(u.mei?' '+u.mei:'')||'この利用者')+' 様';
  document.getElementById('confirm-bg').classList.add('open');
}
function closeConfirm(){document.getElementById('confirm-bg').classList.remove('open');deleteIdx=-1;}
function bgClose(e){if(e.target===document.getElementById('confirm-bg'))closeConfirm();}
function doDelete(){if(deleteIdx<0)return;users.splice(deleteIdx,1);closeConfirm();closeForm();}

setInterval(function(){var dates=getWeekDates(),k=weekKey(dates);if(k!==lastWeekKey)render();},60000);
updateTitle();render();
</script>
